name: Update EGX Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * 0-4"
    - cron: "15 9 * * 0-4"
    - cron: "15 11 * * 0-4"
    - cron: "45 12 * * 0-4"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect market data
        run: node scripts/collect-market-gateway.js || echo "Market collection skipped"

      - name: Build price reconciliation
        run: node scripts/build-price-reconciliation-report.js || echo "Price reconciliation skipped"

      - name: Build final ranking
        run: node scripts/build-final-opportunity-ranking.js || echo "Final ranking skipped"

      - name: Build multi-source intelligence
        run: node scripts/build-multi-source-intelligence.js || echo "Multi-source intelligence skipped"

      - name: Apply multi-source intelligence
        run: node scripts/apply-multisource-intelligence-to-ranking.js || echo "Apply multi-source skipped"

      - name: Build trust governor
        run: node scripts/build-recommendation-trust-governor.js || echo "Trust governor skipped"

      - name: Build unified decision board
        run: node scripts/build-unified-decision-board.js || echo "Unified decision board skipped"

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.json || true
          git commit -m "Update EGX market data and trust reports" || echo "No changes to commit"
          git push || echo "Nothing to push"
